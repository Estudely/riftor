name: demo

# Render demo.gif from demo.tape with VHS and commit it back.
# Runs on demand, or automatically when the tape/workflow changes.

on:
  workflow_dispatch:
  push:
    # Only on branch pushes to main — NOT on tags. A tag checkout is a detached
    # HEAD, so the "commit demo.gif back" step has no branch to push to.
    branches: [main]
    paths:
      - "demo.tape"
      - ".github/workflows/demo.yml"

permissions:
  contents: write

env:
  ANTHROPIC_API_KEY: sk-demo  # dummy; the tape only uses offline commands

jobs:
  gif:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Install riftor (on PATH for VHS)
        run: |
          uv venv /opt/rv
          uv pip install --python /opt/rv .
          echo "/opt/rv/bin" >> "$GITHUB_PATH"
      - name: Install VHS toolchain (ffmpeg + ttyd + vhs)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -fsSL https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64 \
            -o /usr/local/bin/ttyd
          sudo chmod +x /usr/local/bin/ttyd
          go install github.com/charmbracelet/vhs@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Render demo.gif
        run: |
          riftor --version
          ttyd --version
          vhs --version
          vhs demo.tape
      - name: Commit demo.gif if changed
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain demo.gif)" ]; then
            echo "demo.gif unchanged"
            exit 0
          fi
          # Resolve the branch to push to. On a tag/detached checkout there is
          # none — skip rather than fail (the workflow shouldn't run there anyway).
          BRANCH="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "not on a branch (ref_type=${GITHUB_REF_TYPE}); skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add demo.gif
          git commit -m "chore: regenerate demo.gif [skip ci]"
          git push origin "HEAD:${BRANCH}"
